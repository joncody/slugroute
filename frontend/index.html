<!DOCTYPE html>
<html>
<head>
    <title>SlugRoute Sprint 1</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #map { flex-grow: 1; }
        .ui { padding: 20px; background: #003C6C; color: white; display: flex; gap: 10px; }
        input { padding: 8px; border-radius: 4px; border: none; width: 250px; }
    </style>
</head>
<body>

<div class="ui">
    <strong>SlugRoute</strong>
    <input type="text" id="course" placeholder="Enter Course (e.g. CSE 115A)">
    <button onclick="search()">Search</button>
</div>
<div id="map"></div>

<script>
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';
    
    // Sprint 2 Preview: Building to Coord Mapping
    const buildingMap = {
        "Baskin Engr": [-122.0640, 36.9991],
        "Classroom Unit": [-122.0623, 36.9975],
        "Soc Sci 1": [-122.0583, 36.9990],
        "Earth & Marine": [-122.0620, 36.9998],
        "Oakes Acad": [-122.0669, 36.9891]
    };

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-122.0608, 36.9914],
        zoom: 14
    });

    let markers = [];

    async function search() {
        const code = document.getElementById('course').value.toUpperCase();
        const resp = await fetch(`http://localhost:8080/api/course/${code}`);
        const data = await resp.json();

        // Clear old pins
        markers.forEach(m => m.remove());
        
        data.forEach(meet => {
            // Find which building key is in the location string (e.g. "Baskin Engr 101")
            const buildingKey = Object.keys(buildingMap).find(k => meet.location.includes(k));
            const coords = buildingKey ? buildingMap[buildingKey] : [-122.0608, 36.9914];

            const marker = new mapboxgl.Marker({ color: meet.type === 'LEC' ? '#ffcc00' : '#00aaff' })
                .setLngLat(coords)
                .setPopup(new mapboxgl.Popup().setHTML(`<b>${meet.type}</b><br>${meet.location}<br>${meet.time}`))
                .addTo(map);
            
            markers.push(marker);
        });
    }
</script>
</body>
</html>
