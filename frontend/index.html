<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlugRoute | UCSC Course Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <button id="sidebar-toggle" class="menu-btn" title="Toggle Sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <img src="logo.png" class="logo-slug" alt="Sammy the Slug">
                <span class="logo-text">SlugRoute</span>
            </div>
            <div class="search-container">
                <form id="search-form" onsubmit="event.preventDefault(); searchCourse();" style="display: flex; width: 100%; gap: 8px;">
                    <input type="search" id="course-input" placeholder="Search Course (e.g. CSE 115A)" autocomplete="off">
                    <button type="submit" id="search-btn">Search</button>
                </form>
                <div id="search-preview" class="search-preview-dropdown"></div>
            </div>
        </div>
    </nav>
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-section">
                <h3>Select Term</h3>
                <div class="term-selector-container">
                    <select id="term-select" class="term-dropdown">
                        <option value="2262" selected>Spring 2026</option>
                        <option value="2264">Summer 2026</option>
                    </select>
                </div>
            </div>
            <div class="sidebar-section">
                <h3>View Filters</h3>
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="LEC" checked>
                        <span class="legend-symbol" style="font-size: 25px;">★</span> Lectures
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="LAB" checked>
                        <span class="legend-symbol">■</span> Labs
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="DIS" checked>
                        <span class="legend-symbol" style="font-size: 21px;">▲</span> Discussions
                    </label>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Current Results</h3>
                    <button id="clear-results-btn" onclick="clearResults()" class="text-btn-red">Clear All</button>
                </div>
                <div id="search-results" class="course-list">
                    <p class="empty-msg">Search for a course to see sections here.</p>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Saved for Later</h3>
                    <div class="header-actions">
                        <button onclick="addAllSavedToResults()" class="text-btn-blue">Add All</button>
                    </div>
                </div>
                <div id="saved-classes" class="course-list">
                    <!-- Saved items populated by JS -->
                </div>
            </div>
        </aside>
        <!-- Map Container -->
        <main id="map-container">
            <div id="map"></div>
            <button id="locateBtn" onclick="requestLocation()">📍 Find Me</button>
            <div id="locationModal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:24px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.2); z-index:1000; max-width:300px; text-align:center;">
                <h3 style="margin-bottom:8px;">📍 Enable Location</h3>
                <p style="color:#64748b; font-size:0.9rem; margin-bottom:16px;">Please allow SlugRoute to access your location so that it can help you navigate around campus.</p>
                <div style="display:flex; gap:8px; justify-content:center;">
                    <button onclick="denyLocation()" style="padding:8px 16px; border-radius:6px; border:1px solid #e2e8f0; cursor:pointer;">Not Now</button>
                    <button onclick="allowLocation()" style="padding:8px 16px; border-radius:6px; background:#003C6C; color:white; border:none; cursor:pointer;">Allow</button>
                </div>
            </div>
        </main>

    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBwp-UoWjYJ4mz-5IJFqAwZsiTffVRPmKg&map_ids=75ccfb1714f1ad1ed6ac3269&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
