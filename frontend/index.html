<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlugRoute | UCSC Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 overflow-hidden">
    <nav class="navbar shadow-lg">
        <div class="nav-container px-6">
            <div class="brand flex items-center gap-2">
                <span class="text-2xl">🐌</span>
                <span class="logo-text">SlugRoute</span>
            </div>
            <div class="search-container">
                <input type="text" id="courseInput" placeholder="Enter Course (e.g. CSE 115A)">
                <button onclick="searchCourse()" id="searchBtn">Find Classes</button>
                <label style="color: white;">
                <input type="checkbox" id="showDIS"> Show Discussion
                </label>
        </div>
    </nav>
    <div id="map"></div>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7Lf0XOfjaOrXdD8cXAhCZPIhtPOBh41o&map_ids=75ccfb1714f1ad1ed6ac3269&callback=initMap" async defer></script>
    <script src="script.js"></script>
</body>
</html>
