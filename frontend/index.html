<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SlugRoute | UCSC Course Map</title>
    <script>
        // Apply theme immediately to prevent flashing
        const savedTheme = localStorage.getItem('slugroute_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <link rel="stylesheet" href="/style/main.css">
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <button id="sidebar-toggle" class="menu-btn" title="Toggle Sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <img src="/logo.png" class="logo-slug" alt="Sammy the Slug Logo">
                <span class="logo-text">SlugRoute</span>
            </div>
            <div class="search-container">
                <form id="search-form">
                    <input type="search" id="course-input" placeholder="Search Course (e.g. CSE 115A)" autocomplete="off">
                    <button type="submit" id="search-btn">Search</button>
                </form>
                <div id="search-preview" class="search-preview-dropdown"></div>
            </div>
        </div>
    </nav>
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-section">
                <h3>Select Term</h3>
                <div class="term-selector-container">
                    <select id="term-select" class="term-dropdown">
                        <option value="">Loading available terms...</option>
                    </select>
                </div>
            </div>
            <div class="sidebar-section">
                <h3>View Filters</h3>
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="LEC" checked>
                        <span class="legend-symbol symbol-star">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>
                        </span> Lectures
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="LAB" checked>
                        <span class="legend-symbol">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18"/></svg>
                        </span> Labs
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" class="filter-type" value="DIS" checked>
                        <span class="legend-symbol symbol-triangle">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 21H22L12 2Z"/></svg>
                        </span> Discussions
                    </label>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Current Results</h3>
                    <button id="clear-results-btn" class="text-btn-red">Clear All</button>
                </div>
                <div id="search-results" class="course-list">
                    <p class="empty-msg">Search for a course to see sections here.</p>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Saved for Later</h3>
                    <div class="header-actions">
                        <button id="add-all-saved-btn" class="text-btn-blue">Add All</button>
                    </div>
                </div>
                <div id="saved-classes" class="course-list">
                    <!-- Saved items populated by JS -->
                </div>
            </div>
        </aside>
        <!-- Map Container -->
        <main id="map-container">
            <div id="map"></div>
            <div class="map-controls">
                <div class="control-stack">
                    <button id="theme-toggle" class="map-btn" title="Toggle Dark Mode">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path class="sun-icon" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"></path>
                            <path class="moon-icon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <button id="recenter-ui-btn" class="map-btn" title="Recenter to UCSC">  
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M4 4h6V2H2v8h2V4z"/><path d="M20 4h-6V2h8v8h-2V4z"/><path d="M4 20h6v2H2v-8h2v6z"/><path d="M20 20h-6v2h8v-8h-2v6z"/><circle cx="12" cy="12" r="2"/>
                        </svg>
                    </button>
                    <button id="clear-route-btn" class="map-btn" title="Clear Route">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z"/>
                        </svg>
                    </button>
                    <div class="map-btn-group">
                        <button id="choose-location-btn" class="map-btn" title="Set Start Point Manually">
                            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        </button>
                        <button id="grab-location-btn" class="map-btn" title="Your GPS Location">
                            <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div id="location-modal">
                <h3 id="modal-title">Enable Location</h3>
                <p>Please allow SlugRoute to access your location so that it can help you navigate around campus.</p>
                <div class="modal-actions">
                    <button id="deny-location-btn" class="modal-btn-secondary">Not Now</button>
                    <button id="allow-location-btn" class="modal-btn-primary">Allow</button>
                </div>
            </div>
        </main>
    </div>
    <!-- Entry point for modular JS -->
    <script type="module" src="/js/app.js"></script>
    <!-- The .MapsKey variable is supplanted by the Go server at runtime -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ .MapsKey }}&map_ids=75ccfb1714f1ad1ed6ac3269&callback=initMap" async defer></script>
</body>
</html>
