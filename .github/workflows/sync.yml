name: Automated Data Synchronization

on:
  schedule:
    - cron: '0 0 * * *' # Every 24 hours at midnight
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          cd scraper
          python scraper.py

      - name: Run Building Migration
        run: |
          cd database
          python import_coords.py

      - name: Commit Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add database/slugroute.db
          git commit -m "Automated Data Sync: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || echo "No changes to commit"
          git push
